name: Build the application for all devices and upload the artifact

on:
  workflow_call:
    inputs:
      app_repository:
        description: 'The GIT repository to build (defaults to `github.repository`)'
        required: false
        default: ${{ github.repository }}
        type: string
      app_branch_name:
        description: 'The GIT branch to build (defaults to `github.ref`)'
        required: false
        default: ${{ github.ref }}
        type: string
      run_for_devices:
        description: |
          The list of device(s) on which the CI will run.

          Defaults to the full list of device(s) supported by the application as configured in the
          'ledger_app.toml' manifest.
          If the manifest is missing, defaults to ALL (["nanos", "nanox", "nanosp", "stax", "flex", "apex_m", "apex_p"]).
        required: false
        default: 'None'
        type: string
      builder:
        description: "The docker image to build the application in (defaults to ledger-app-builder-lite)"
        required: false
        default: 'ledger-app-builder-lite'
        type: string
      flags:
        description: "Additional flags (default to none)"
        required: false
        default: ''
        type: string

permissions:
  contents: read
  security-events: write  # Needed for CodeQL analysis upload

env:
  APP_REPOSITORY: ${{ inputs.app_repository }}
  APP_BRANCH_NAME: ${{ inputs.app_branch_name }}
  RUN_FOR_DEVICES: ${{ inputs.run_for_devices }}
  BUILDER: ${{ inputs.builder }}
  FLAGS: ${{ inputs.flags }}

jobs:
  handle_inputs:
    name: Handle and validate inputs
    runs-on: ubuntu-latest
    outputs:
      APP_REPOSITORY: ${{ steps.set_outputs.outputs.APP_REPOSITORY }}
      APP_BRANCH_NAME: ${{ steps.set_outputs.outputs.APP_BRANCH_NAME }}
      RUN_FOR_DEVICES: ${{ steps.set_outputs.outputs.RUN_FOR_DEVICES }}
      BUILDER: ${{ steps.set_outputs.outputs.BUILDER }}
      FLAGS: ${{ steps.set_outputs.outputs.FLAGS }}
    steps:
      - name: Handle inputs
        id: set_outputs
        run: |
          {
            echo "APP_REPOSITORY=${APP_REPOSITORY}"
            echo "APP_BRANCH_NAME=${APP_BRANCH_NAME}"
            echo "RUN_FOR_DEVICES=${RUN_FOR_DEVICES}"
            echo "BUILDER=${BUILDER}"
            echo "FLAGS=${FLAGS}"
          } >> "$GITHUB_OUTPUT"

  call_get_app_metadata:
    # This job digests inputs and repository metadata provided by the `ledger_app.toml` manifest
    # file, in order to output relevant compatible devices needed by following jobs.
    name: Retrieve application metadata
    uses: ./.github/workflows/_get_app_metadata.yml
    needs: [handle_inputs]
    with:
      app_repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
      app_branch_name: ${{ needs.handle_inputs.outputs.APP_BRANCH_NAME }}
      compatible_devices: ${{ needs.handle_inputs.outputs.RUN_FOR_DEVICES }}
    secrets:
      token: ${{ secrets.token }}

  build_device_matrix:
    name: Build device matrix
    needs: call_get_app_metadata
    runs-on: ubuntu-latest
    outputs:
      sdks_config: ${{ steps.sdk_list.outputs.sdks_config }}

    steps:
      - name: Define the list of devices to target
        id: sdk_list
        shell: bash
        run: |
          if [ "${{ needs.handle_inputs.outputs.RUN_FOR_DEVICES }}" = "None" ]; then
            # Use the compatible devices from metadata
            devices_json="${{ needs.call_get_app_metadata.outputs.compatible_devices }}"
          else
            # Convert space-separated string to JSON array
            devices_string="${{ needs.handle_inputs.outputs.RUN_FOR_DEVICES }}"
            devices_json=$(echo "${devices_string}" | jq -R 'split(" ")')
          fi

          # Generate SDK environment variables from device names
          sdks_json=$(echo "${devices_json}" | jq -c 'map("$" + (. | ascii_upcase) + "_SDK")')

          echo "sdks_config=${sdks_json}" >> "$GITHUB_OUTPUT"

      - name: Print devices and SDKs
        run: |
          echo "SDKs: ${{ steps.sdk_list.outputs.sdks_config }}"

  analyse:
    name: Analyse application
    needs: [handle_inputs, build_device_matrix]
    strategy:
      fail-fast: false
      matrix:
        sdk: ${{ fromJSON(needs.build_device_matrix.outputs.sdks_config) }}
        # 'cpp' covers C and C++
        language: ['cpp']
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/${{ needs.handle_inputs.outputs.BUILDER }}:latest

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
          ref: ${{ needs.handle_inputs.outputs.APP_BRANCH_NAME }}
          submodules: recursive
          token: ${{ secrets.token && secrets.token || github.token }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # CodeQL will create the database during the compilation
      - name: Build
        run: |
          ${{ needs.handle_inputs.outputs.FLAGS }} make BOLOS_SDK=${{ matrix.sdk }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
