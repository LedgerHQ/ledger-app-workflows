name: Generate Documentation

on:
  workflow_call:
    inputs:
      app_repository:
        description: 'The GIT repository to test (defaults to `github.repository`)'
        required: false
        default: ${{ github.repository }}
        type: string
      app_branch_name:
        description: 'The GIT branch to test (defaults to `github.ref`)'
        required: false
        default: ${{ github.ref }}
        type: string
      doxy_file:
        description: 'Doxygen configuration file'
        required: false
        default: '.doxygen/Doxyfile'
        type: string

permissions:
  contents: read
  actions: write  # Needed for upload-artifact

env:
  APP_REPOSITORY: ${{ inputs.app_repository }}
  APP_BRANCH_NAME: ${{ inputs.app_branch_name }}
  DOXY_FILE: ${{ inputs.doxy_file }}

jobs:
  handle_inputs:
    name: Handle and validate inputs
    runs-on: ubuntu-latest
    outputs:
      APP_REPOSITORY: ${{ steps.set_outputs.outputs.APP_REPOSITORY }}
      APP_BRANCH_NAME: ${{ steps.set_outputs.outputs.APP_BRANCH_NAME }}
      DOXY_FILE: ${{ steps.set_outputs.outputs.DOXY_FILE }}
    steps:
      - name: Handle Inputs
        id: set_outputs
        run: |
          {
            echo "APP_REPOSITORY=${APP_REPOSITORY}"
            echo "APP_BRANCH_NAME=${APP_BRANCH_NAME}"
            echo "DOXY_FILE=${DOXY_FILE}"
          } >> "$GITHUB_OUTPUT"

  job_generate_doc:
    name: Generate project documentation
    runs-on: ubuntu-latest
    needs: [handle_inputs]
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder-lite:latest

    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
          ref: ${{ needs.handle_inputs.outputs.APP_BRANCH_NAME }}

      - name: HTML documentation
        run: doxygen ${{ needs.handle_inputs.outputs.DOXY_FILE }}

      - uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: doc/html
