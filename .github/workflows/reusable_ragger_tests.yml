---
name: Functional tests using Ragger

on:
  workflow_call:
    inputs:
      app_repository:
        description: 'The GIT repository to test (defaults to `github.repository`)'
        required: false
        default: ${{ github.repository }}
        type: string
      app_branch_name:
        description: 'The GIT branch to test (defaults to `github.ref`)'
        required: false
        default: ${{ github.ref }}
        type: string
      test_dir:
        description: |
          The directory where the Python tests are stored (a `conftest.py` file is expected there).

          If the application is configured with a 'ledger_app.toml' file at its root containing a
          `test.pytest_directory` field, this parameter is ignored.
          If this parameter is defined neither as a workflow input nor in the manifest file, the
          workflow will output an error.
        required: false
        default: 'None'
        type: string
      download_app_binaries_artifact:
        description: 'The name of the artifact containing the application binary file(s) to be tested. Required'
        required: true
        type: string
      additional_app_binaries_artifact:
        description: 'The name of the artifact containing the additional app binary file(s), if needed by the application to be tested (defaults to empty string)'
        required: false
        default: ''
        type: string
      additional_app_binaries_artifact_dir:
        description: 'The directory where the additional app binaries will be downloaded (defaults to ".")'
        required: false
        default: '.'
        type: string
      lib_binaries_artifact:
        description: 'The name of the artifact containing the library binary file(s), if needed by the application to be tested (defaults to empty string)'
        required: false
        default: ''
        type: string
      lib_binaries_artifact_dir:
        description: 'The directory where the additional lib binaries will be downloaded (defaults to ".")'
        required: false
        default: '.'
        type: string
      run_for_devices:
        description: |
          The list of device(s) on which the test will run.

          Defaults to the full list of device(s) supported by the application as configured in the
          'ledger_app.toml' manifest.
          If the manifest is missing, defaults to ALL (["nanos", "nanox", "nanosp", "stax", "flex", "apex_m", "apex_p"]).
        required: false
        default: 'None'
        type: string
      upload_snapshots_on_failure:
        description: 'Enable or disable upload of tests snapshots if the job fails (defaults to true).'
        required: false
        default: true
        type: boolean
      test_filter:
        description: 'Specify an expression which implements a substring match on the test names'
        required: false
        default: ''
        type: string
      test_options:
        description: 'Specify optional parameters to be passed to the running test'
        required: false
        default: ''
        type: string
      regenerate_snapshots:
        description: 'Clean snapshots, regenerate them, commit the changes in a branch, and open a PR'
        required: false
        default: false
        type: boolean
      container_image:
        description: 'Optional container image to run the ragger_tests job'
        required: false
        default: ''
        type: string
    secrets:
      secret_test_options:
        description: 'A string of secret options to be given to `pytest`'
        required: false

permissions:
  contents: write       # Needed for _open_pr_with_new_snapshots.yml
  actions: write        # Needed for upload-artifact
  pull-requests: write  # Needed for _open_pr_with_new_snapshots.yml

env:
  APP_REPOSITORY: ${{ inputs.app_repository }}
  APP_BRANCH_NAME: ${{ inputs.app_branch_name }}
  TEST_DIR: ${{ inputs.test_dir }}
  DOWNLOAD_APP_BINARIES_ARTIFACT: ${{ inputs.download_app_binaries_artifact }}
  ADDITIONAL_APP_BINARIES_ARTIFACT: ${{ inputs.additional_app_binaries_artifact }}
  ADDITIONAL_APP_BINARIES_ARTIFACT_DIR: ${{ inputs.additional_app_binaries_artifact_dir }}
  LIB_BINARIES_ARTIFACT: ${{ inputs.lib_binaries_artifact }}
  LIB_BINARIES_ARTIFACT_DIR: ${{ inputs.lib_binaries_artifact_dir }}
  RUN_FOR_DEVICES: ${{ inputs.run_for_devices }}
  UPLOAD_SNAPSHOTS_ON_FAILURE: ${{ inputs.upload_snapshots_on_failure }}
  TEST_FILTER: ${{ inputs.test_filter }}
  TEST_OPTIONS: ${{ inputs.test_options }}
  REGENERATE_SNAPSHOTS: ${{ inputs.regenerate_snapshots }}
  CONTAINER_IMAGE: ${{ inputs.container_image }}

jobs:
  handle_inputs:
    name: Handle and validate inputs
    runs-on: ubuntu-latest
    outputs:
      APP_REPOSITORY: ${{ steps.set_outputs.outputs.APP_REPOSITORY }}
      APP_BRANCH_NAME: ${{ steps.set_outputs.outputs.APP_BRANCH_NAME }}
      TEST_DIR: ${{ steps.set_outputs.outputs.TEST_DIR }}
      DOWNLOAD_APP_BINARIES_ARTIFACT: ${{ steps.set_outputs.outputs.DOWNLOAD_APP_BINARIES_ARTIFACT }}
      ADDITIONAL_APP_BINARIES_ARTIFACT: ${{ steps.set_outputs.outputs.ADDITIONAL_APP_BINARIES_ARTIFACT }}
      ADDITIONAL_APP_BINARIES_ARTIFACT_DIR: ${{ steps.set_outputs.outputs.ADDITIONAL_APP_BINARIES_ARTIFACT_DIR }}
      LIB_BINARIES_ARTIFACT: ${{ steps.set_outputs.outputs.LIB_BINARIES_ARTIFACT }}
      LIB_BINARIES_ARTIFACT_DIR: ${{ steps.set_outputs.outputs.LIB_BINARIES_ARTIFACT_DIR }}
      RUN_FOR_DEVICES: ${{ steps.set_outputs.outputs.RUN_FOR_DEVICES }}
      UPLOAD_SNAPSHOTS_ON_FAILURE: ${{ steps.set_outputs.outputs.UPLOAD_SNAPSHOTS_ON_FAILURE }}
      TEST_FILTER: ${{ steps.set_outputs.outputs.TEST_FILTER }}
      TEST_OPTIONS: ${{ steps.set_outputs.outputs.TEST_OPTIONS }}
      REGENERATE_SNAPSHOTS: ${{ steps.set_outputs.outputs.REGENERATE_SNAPSHOTS }}
      CONTAINER_IMAGE: ${{ steps.set_outputs.outputs.CONTAINER_IMAGE }}
    steps:
      - name: Handle Inputs
        id: set_outputs
        run: |
          {
            echo "APP_REPOSITORY=${APP_REPOSITORY}"
            echo "APP_BRANCH_NAME=${APP_BRANCH_NAME}"
            echo "TEST_DIR=${TEST_DIR}"
            echo "DOWNLOAD_APP_BINARIES_ARTIFACT=${DOWNLOAD_APP_BINARIES_ARTIFACT}"
            echo "ADDITIONAL_APP_BINARIES_ARTIFACT=${ADDITIONAL_APP_BINARIES_ARTIFACT}"
            echo "ADDITIONAL_APP_BINARIES_ARTIFACT_DIR=${ADDITIONAL_APP_BINARIES_ARTIFACT_DIR}"
            echo "LIB_BINARIES_ARTIFACT=${LIB_BINARIES_ARTIFACT}"
            echo "LIB_BINARIES_ARTIFACT_DIR=${LIB_BINARIES_ARTIFACT_DIR}"
            echo "RUN_FOR_DEVICES=${RUN_FOR_DEVICES}"
            echo "UPLOAD_SNAPSHOTS_ON_FAILURE=${UPLOAD_SNAPSHOTS_ON_FAILURE}"
            echo "TEST_FILTER=${TEST_FILTER}"
            echo "TEST_OPTIONS=${TEST_OPTIONS}"
            echo "REGENERATE_SNAPSHOTS=${REGENERATE_SNAPSHOTS}"
            echo "CONTAINER_IMAGE=${CONTAINER_IMAGE}"
          } >> "$GITHUB_OUTPUT"

  call_get_app_metadata:
    # This job digests inputs and repository metadata provided by the `ledger_app.toml` manifest
    # file, in order to output relevant directories, compatible devices, and other variables needed
    # by following jobs.
    name: Retrieve application metadata
    uses: ./.github/workflows/_get_app_metadata.yml
    needs: [handle_inputs]
    with:
      app_repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
      app_branch_name: ${{ needs.handle_inputs.outputs.APP_BRANCH_NAME }}
      compatible_devices: ${{ needs.handle_inputs.outputs.RUN_FOR_DEVICES }}

  call_get_test_metadata:
    name: Retrieve test metadata
    uses: ./.github/workflows/_get_test_metadata.yml
    needs: [handle_inputs]
    with:
      app_repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
      app_branch_name: ${{ needs.handle_inputs.outputs.APP_BRANCH_NAME }}
      pytest_directory: ${{ needs.handle_inputs.outputs.TEST_DIR }}

  ragger_tests:
    name: Functional tests with Ragger
    needs: [handle_inputs, call_get_app_metadata, call_get_test_metadata]
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.call_get_app_metadata.outputs.compatible_devices) }}
    runs-on: ubuntu-22.04
    container: ${{ inputs.container_image != '' && inputs.container_image || null }}

    steps:
      - name: Check metadata
        run: |
          if [ "${{ needs.call_get_test_metadata.outputs.pytest_directory }}" = 'None' ]; then
              >&2 echo "ERROR: This workflow either needs a 'ledger_app.toml' manifest with a 'tests.pytest_directory' section, or be configured with a valid 'test_dir' parameter"
              exit 1
          fi

      - name: Clone
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
          ref: ${{ needs.handle_inputs.outputs.APP_BRANCH_NAME }}
          submodules: recursive

      - name: Set binary path
        id: "set_binary_path"
        run: |
          if [ "${{ needs.call_get_app_metadata.outputs.is_rust }}" = "true" ];
          then
              echo "Set Rust binary path" && \
              cd ${{ needs.call_get_app_metadata.outputs.build_directory }} && \
              binary_path=$(cargo metadata --no-deps --format-version 1 | jq -r '.target_directory')/ && \
              echo "binary_path=$binary_path" >> $GITHUB_OUTPUT
          else
              echo "binary_path=${{ needs.call_get_app_metadata.outputs.build_directory }}/build/" >> $GITHUB_OUTPUT
          fi

      - name: Download app binaries
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.handle_inputs.outputs.DOWNLOAD_APP_BINARIES_ARTIFACT }}
          path: ${{ steps.set_binary_path.outputs.binary_path }}

      - name: Display structure of downloaded files
        run: ls -1 ${{ steps.set_binary_path.outputs.binary_path }}

      - name: Download additional app binaries if required
        if: ${{ needs.handle_inputs.outputs.ADDITIONAL_APP_BINARIES_ARTIFACT != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.handle_inputs.outputs.ADDITIONAL_APP_BINARIES_ARTIFACT }}
          path: ${{ needs.handle_inputs.outputs.ADDITIONAL_APP_BINARIES_ARTIFACT_DIR }}

      - name: Display structure of downloaded files
        if: ${{ needs.handle_inputs.outputs.ADDITIONAL_APP_BINARIES_ARTIFACT_DIR != '' }}
        run: ls -1 ${{ needs.handle_inputs.outputs.ADDITIONAL_APP_BINARIES_ARTIFACT_DIR }}

      - name: Download additional lib binaries if required
        if: ${{ needs.handle_inputs.outputs.LIB_BINARIES_ARTIFACT != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.handle_inputs.outputs.LIB_BINARIES_ARTIFACT }}
          path: ${{ needs.handle_inputs.outputs.LIB_BINARIES_ARTIFACT_DIR }}

      - name: Display structure of downloaded files
        if: ${{ needs.handle_inputs.outputs.LIB_BINARIES_ARTIFACT != '' }}
        run: ls -1 ${{ needs.handle_inputs.outputs.LIB_BINARIES_ARTIFACT_DIR }}

      - name: Install tests dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static tesseract-ocr libtesseract-dev
          pip install -U pip packaging setuptools
          pip install -r "${{ needs.call_get_test_metadata.outputs.pytest_directory }}/requirements.txt"
          if [ -f ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/setup_script.sh ]; then
            ./${{ needs.call_get_test_metadata.outputs.pytest_directory }}/setup_script.sh
          fi

      - name: Clear legacy snapshots
        if: ${{ needs.handle_inputs.outputs.REGENERATE_SNAPSHOTS == 'true' }}
        run: |
          rm -rf ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/snapshots

      - name: Run test
        env:
          CTEST_OUTPUT_ON_FAILURE: 1
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          ARGS=(--tb=short -v --device "${{ matrix.device }}")
          ARGS+=("${{ needs.call_get_test_metadata.outputs.pytest_directory }}/")

          # Add -k only if 'test_filter' is not empty
          if [ -n "${{ needs.handle_inputs.outputs.TEST_FILTER }}" ]; then
            ARGS+=(-k "${{ needs.handle_inputs.outputs.TEST_FILTER }}")
          fi

          # Add additional options
          if [ -n "${{ needs.handle_inputs.outputs.TEST_OPTIONS }}" ]; then
            ARGS+=(${{ needs.handle_inputs.outputs.TEST_OPTIONS }})
          fi

          if [ -n "${{ secrets.secret_test_options }}" ]; then
            ARGS+=(${{ secrets.secret_test_options }})
          fi

          if [ "${{ needs.handle_inputs.outputs.REGENERATE_SNAPSHOTS }}" = "true" ]; then
            ARGS+=(--golden_run)
          fi

          pytest "${ARGS[@]}"

      - name: Upload snapshots on failure if needed
        if: ${{ failure() && needs.handle_inputs.outputs.UPLOAD_SNAPSHOTS_ON_FAILURE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          # Make the artifact name unique to allow running this job in parallel
          name: tests_snapshots${{ needs.handle_inputs.outputs.TEST_OPTIONS }}-${{ matrix.device }}
          path: ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/snapshots-tmp

      - name: Upload snapshots on success if needed
        if: ${{ needs.handle_inputs.outputs.REGENERATE_SNAPSHOTS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: tests_snapshots${{ needs.handle_inputs.outputs.TEST_OPTIONS }}-${{ matrix.device }}
          path: ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/snapshots-tmp

      - name: Set upload flag
        id: upload-flag
        if: ${{ (failure() && needs.handle_inputs.outputs.UPLOAD_SNAPSHOTS_ON_FAILURE == 'true') || ( success() && needs.handle_inputs.outputs.REGENERATE_SNAPSHOTS == 'true') }}
        run: |
          echo "artifact_uploaded=true" >> "$GITHUB_OUTPUT"

    outputs:
      snapshot_artifact_uploaded: ${{ steps.upload-flag.outputs.artifact_uploaded }}

  merge_artifacts_if_needed:
    # Merge matrix output
    name: Merge snapshots artifacts
    needs: [handle_inputs, ragger_tests]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/upload-artifact/merge@v4
        if: ${{ needs.ragger_tests.outputs.snapshot_artifact_uploaded == 'true' }}
        with:
          name: tests_snapshots${{ needs.handle_inputs.outputs.TEST_OPTIONS }}
          pattern: tests_snapshots${{ needs.handle_inputs.outputs.TEST_OPTIONS }}-*
          delete-merged: true

    outputs:
      snapshot_artifact_name: tests_snapshots${{ needs.handle_inputs.outputs.TEST_OPTIONS }}

  pr_new_snapshots:
    name: Open a PR with the new snapshots
    needs: [handle_inputs, merge_artifacts_if_needed, call_get_app_metadata, call_get_test_metadata]
    if: ${{ inputs.regenerate_snapshots == true }}
    uses: ./.github/workflows/_open_pr_with_new_snapshots.yml
    with:
      app_repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
      app_branch_name: ${{ needs.handle_inputs.outputs.APP_BRANCH_NAME }}
      snapshots_artifact_name: ${{ needs.merge_artifacts_if_needed.outputs.snapshot_artifact_name }}
      snapshots_directory: ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/snapshots
