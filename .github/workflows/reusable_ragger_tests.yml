---
name: Functional tests using Ragger

on:
  workflow_call:
    inputs:
      app_repository:
        description: 'The GIT repository to test (defaults to `github.repository`)'
        required: false
        default: ${{ github.repository }}
        type: string
      app_branch_name:
        description: 'The GIT branch to test (defaults to `github.ref`)'
        required: false
        default: ${{ github.ref }}
        type: string
      test_dir:
        description: |
          The directory where the Python tests are stored (a `conftest.py` file is expected there).

          If the application is configured with a 'ledger_app.toml' file at its root containing a
          `test.pytest_directory` field, this parameter is ignored.
          If this parameter is defined neither as a workflow input nor in the manifest file, the
          workflow will output an error.
        required: false
        default: 'None'
        type: string
      download_app_binaries_artifact:
        description: 'The name of the artifact containing the application binary file(s) to be tested. Required'
        required: true
        type: string
      additional_app_binaries_artifact:
        description: 'The name of the artifact containing the additional app binary file(s), if needed by the application to be tested (defaults to empty string)'
        required: false
        default: ''
        type: string
      additional_app_binaries_artifact_dir:
        description: 'The directory where the additional app binaries will be downloaded (defaults to ".")'
        required: false
        default: '.'
        type: string
      lib_binaries_artifact:
        description: 'The name of the artifact containing the library binary file(s), if needed by the application to be tested (defaults to empty string)'
        required: false
        default: ''
        type: string
      lib_binaries_artifact_dir:
        description: 'The directory where the additional lib binaries will be downloaded (defaults to ".")'
        required: false
        default: '.'
        type: string
      run_for_devices:
        description: |
          The list of device(s) on which the test will run.

          Defaults to the full list of device(s) supported by the application as configured in the
          'ledger_app.toml' manifest.
          If the manifest is missing, defaults to ALL (["nanos", "nanox", "nanosp", "stax", "flex", "apex_m", "apex_p"]).
        required: false
        default: 'None'
        type: string
      upload_snapshots_on_failure:
        description: 'Enable or disable upload of tests snapshots if the job fails (defaults to true).'
        required: false
        default: true
        type: boolean
      test_filter:
        description: 'Specify an expression which implements a substring match on the test names'
        required: false
        default: '""'
        type: string
      test_options:
        description: 'Specify optional parameters to be passed to the running test'
        required: false
        default: ''
        type: string
      regenerate_snapshots:
        description: 'Clean snapshots, regenerate them, commit the changes in a branch, and open a PR'
        required: false
        default: false
        type: boolean
      container_image:
        description: 'Optional container image to run the ragger_tests job'
        required: false
        default: ''
        type: string
      capture_file:
        description: 'Optional file name to capture pytest logs into an artifact'
        required: false
        default: ''
        type: string
      post_stack_consumption:
        description: "Whether to post a stack consumption summary comment on PRs (defaults to true).
                     Requires `reusable_build.yml` to be configured with `enable_stack_consumption == true`.
                     Requires the ELF size diff comment from reusable_build to exist."
        required: false
        default: true
        type: boolean
      stack_consumption_section_id:
        description: "Unique identifier for the stack consumption comment section.
                     Used to avoid collisions when multiple workflows post stack summaries on the same PR
                     (e.g. ragger tests vs swap tests). Defaults to 'stack-consumption-summary'."
        required: false
        default: 'stack-consumption-summary'
        type: string
    secrets:
      secret_test_options:
        description: 'A string of secret options to be given to `pytest`'
        required: false

permissions:
  contents: write       # Needed for _open_pr_with_new_snapshots.yml
  actions: write        # Needed for upload-artifact
  pull-requests: write  # Needed for _open_pr_with_new_snapshots.yml

env:
  APP_REPOSITORY: ${{ inputs.app_repository }}
  APP_BRANCH_NAME: ${{ inputs.app_branch_name }}
  TEST_DIR: ${{ inputs.test_dir }}
  DOWNLOAD_APP_BINARIES_ARTIFACT: ${{ inputs.download_app_binaries_artifact }}
  ADDITIONAL_APP_BINARIES_ARTIFACT: ${{ inputs.additional_app_binaries_artifact }}
  ADDITIONAL_APP_BINARIES_ARTIFACT_DIR: ${{ inputs.additional_app_binaries_artifact_dir }}
  LIB_BINARIES_ARTIFACT: ${{ inputs.lib_binaries_artifact }}
  LIB_BINARIES_ARTIFACT_DIR: ${{ inputs.lib_binaries_artifact_dir }}
  RUN_FOR_DEVICES: ${{ inputs.run_for_devices }}
  UPLOAD_SNAPSHOTS_ON_FAILURE: ${{ inputs.upload_snapshots_on_failure }}
  TEST_FILTER: ${{ inputs.test_filter }}
  TEST_OPTIONS: ${{ inputs.test_options }}
  REGENERATE_SNAPSHOTS: ${{ inputs.regenerate_snapshots }}
  CONTAINER_IMAGE: ${{ inputs.container_image }}
  CAPTURE_FILE: ${{ inputs.capture_file }}
  POST_STACK_CONSUMPTION: ${{ inputs.post_stack_consumption }}

jobs:
  call_get_app_metadata:
    # This job digests inputs and repository metadata provided by the `ledger_app.toml` manifest
    # file, in order to output relevant directories, compatible devices, and other variables needed
    # by following jobs.
    name: Retrieve application metadata
    uses: ./.github/workflows/_get_app_metadata.yml
    with:
      app_repository: ${{ inputs.app_repository }}
      app_branch_name: ${{ inputs.app_branch_name }}
      compatible_devices: ${{ inputs.run_for_devices }}

  call_get_test_metadata:
    name: Retrieve test metadata
    uses: ./.github/workflows/_get_test_metadata.yml
    with:
      app_repository: ${{ inputs.app_repository }}
      app_branch_name: ${{ inputs.app_branch_name }}
      pytest_directory: ${{ inputs.test_dir }}

  ragger_tests:
    name: Functional tests with Ragger
    needs: [call_get_app_metadata, call_get_test_metadata]
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.call_get_app_metadata.outputs.compatible_devices) }}
    runs-on: ubuntu-latest
    container: ${{ inputs.container_image != '' && inputs.container_image || null }}

    steps:
      - name: Check metadata
        if: ${{ needs.call_get_test_metadata.outputs.pytest_directory == 'None' }}
        run: |
          echo "ERROR: This workflow either needs a 'ledger_app.toml' manifest with a 'tests.pytest_directory' section, or be configured with a valid 'test_dir' parameter"
          exit 1

      - name: Clone
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.app_repository }}
          ref: ${{ inputs.app_branch_name }}
          submodules: recursive

      - name: Set binary path
        id: "set_binary_path"
        run: |
          if [ "${{ needs.call_get_app_metadata.outputs.is_rust }}" = "true" ];
          then
              echo "Set Rust binary path"
              cd ${{ needs.call_get_app_metadata.outputs.build_directory }}
              binary_path=$(cargo metadata --no-deps --format-version 1 | jq -r '.target_directory')
              echo "binary_path=${binary_path}" >> "${GITHUB_OUTPUT}"
          else
              echo "binary_path=${{ needs.call_get_app_metadata.outputs.build_directory }}/build" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download app binaries
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.download_app_binaries_artifact }}
          path: ${{ steps.set_binary_path.outputs.binary_path }}

      - name: Display structure of downloaded files
        run: ls -1 ${{ steps.set_binary_path.outputs.binary_path }}

      - name: Download additional app binaries if required
        if: ${{ inputs.additional_app_binaries_artifact != '' }}
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.additional_app_binaries_artifact }}
          path: ${{ inputs.additional_app_binaries_artifact_dir }}

      - name: Display structure of downloaded files
        if: ${{ inputs.additional_app_binaries_artifact != '' }}
        run: ls -1 ${ADDITIONAL_APP_BINARIES_ARTIFACT_DIR}

      - name: Download additional lib binaries if required
        if: ${{ inputs.lib_binaries_artifact != '' }}
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.lib_binaries_artifact }}
          path: ${{ inputs.lib_binaries_artifact_dir }}

      - name: Display structure of downloaded files
        if: ${{ inputs.lib_binaries_artifact != '' }}
        run: ls -1 ${LIB_BINARIES_ARTIFACT_DIR}

      - name: Install tests dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static tesseract-ocr libtesseract-dev
          pip install -U pip packaging setuptools
          pip install -r "${{ needs.call_get_test_metadata.outputs.pytest_directory }}/requirements.txt"
          if [ -f ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/setup_script.sh ]; then
            ./${{ needs.call_get_test_metadata.outputs.pytest_directory }}/setup_script.sh
          fi

      - name: Clear legacy snapshots
        if: ${{ inputs.regenerate_snapshots == true }}
        run: |
          rm -rf ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/snapshots

      - name: Run test
        env:
          CTEST_OUTPUT_ON_FAILURE: 1
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        shell: bash
        run: |
          PYTEST_ARGS=("${{ needs.call_get_test_metadata.outputs.pytest_directory }}")
          PYTEST_ARGS+=(--tb=short -v --device "${{ matrix.device }}")

          if [ "${POST_STACK_CONSUMPTION}" = "true" ]; then
            PYTEST_ARGS+=(--get-stack-consumption)
          fi

          if [ -n "${TEST_FILTER}" ] && [ "${TEST_FILTER}" != '""' ]; then
            # Remove leading and trailing quotes from the filter if they exist
            TRIMMED_FILTER="${TEST_FILTER%\"}"
            TRIMMED_FILTER="${TRIMMED_FILTER#\"}"
            PYTEST_ARGS+=(-k "${TRIMMED_FILTER}")
          fi

          if [ "${REGENERATE_SNAPSHOTS}" = "true" ]; then
            PYTEST_ARGS+=(--golden_run)
          fi

          if [ -n "${TEST_OPTIONS}" ]; then
            PYTEST_ARGS+=(${TEST_OPTIONS})
          fi

          if [ -n "${{ secrets.secret_test_options }}" ]; then
            PYTEST_ARGS+=(${{ secrets.secret_test_options }})
          fi

          echo "Running pytest with arguments: ${PYTEST_ARGS[*]}"

          if [ -n "${CAPTURE_FILE}" ]; then
            # Capture pytest output to a file
            pytest "${PYTEST_ARGS[@]}" -s 2>&1 | tee pytest_output.log
          else
            pytest "${PYTEST_ARGS[@]}" 2>&1 | tee pytest_run.log
          fi

      - name: Extract stack consumption summary
        if: ${{ always() }}
        shell: bash
        run: |
          LOG_FILE="pytest_output.log"
          if [ ! -f "$LOG_FILE" ]; then
            LOG_FILE="pytest_run.log"
          fi
          if [ ! -f "$LOG_FILE" ]; then
            echo "No pytest log found, skipping."
            exit 0
          fi
          # Extract from "stack consumption summary" to the "worst case" separator
          awk '/stack consumption summary/{found=1} found{print} /worst case:/{exit}' "$LOG_FILE" > stack_summary_${{ matrix.device }}.txt
          if [ ! -s stack_summary_${{ matrix.device }}.txt ]; then
            echo "No stack consumption data found for ${{ matrix.device }}."
            rm -f stack_summary_${{ matrix.device }}.txt
          else
            cat stack_summary_${{ matrix.device }}.txt
            echo "| Test | Stack |" >> ${GITHUB_STEP_SUMMARY}
            echo "|------|--------------:|" >> ${GITHUB_STEP_SUMMARY}

            # print stack summary detail, worst case line printed out separately
            tail -n +2 stack_summary_${{ matrix.device }}.txt | head -n -1 |
              sed -r -e 's/^/| /' -e 's/$/ |/' -e 's/([[:digit:]]+ bytes)\s+(\S+)/\2 | \1 |/' >> ${GITHUB_STEP_SUMMARY}

            # print worst case line
            echo "" >> ${GITHUB_STEP_SUMMARY}
            tail -n1 stack_summary_${{ matrix.device }}.txt >> ${GITHUB_STEP_SUMMARY}
          fi

      - name: Upload stack consumption summary
        if: ${{ always() && hashFiles(format('stack_summary_{0}.txt', matrix.device)) != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.stack_consumption_section_id }}-${{ matrix.device }}
          path: stack_summary_${{ matrix.device }}.txt

      - name: Upload pytest logs
        if: ${{ inputs.capture_file != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: pytest-logs-${{ matrix.device }}
          path: pytest_output.log

      - name: Set upload flag
        id: upload-flag
        if: ${{ (failure() && inputs.upload_snapshots_on_failure == true) || ( success() && inputs.regenerate_snapshots == true) }}
        run: |
          echo "artifact_uploaded=true" >> "${GITHUB_OUTPUT}"

      # Compute a unique name for this upload
      - name: Compute artifact name
        id: compute_name
        if: ${{ steps.upload-flag.outputs.artifact_uploaded == 'true' }}
        shell: bash
        run: |
          sanitize() {
            LC_ALL=C printf '%s' "$1" \
              | tr '\n' ' ' \
              | sed -E 's/^[[:space:]]+|[[:space:]]+$//g' \
              | tr ' ' '_' \
              | LC_ALL=C tr -c 'A-Za-z0-9._-_' '_' \
              | sed -E 's/_+/_/g'
          }

          safe_test_dir="$(sanitize "${{ needs.call_get_test_metadata.outputs.pytest_directory }}")"
          safe_test_options="$(sanitize "${TEST_OPTIONS}")"

          # If options are empty, skip the dash
          if [[ -n "${safe_test_options}" ]]; then
            artifact_basename="tests_snapshots_${safe_test_dir}-${safe_test_options}"
          else
            artifact_basename="tests_snapshots_${safe_test_dir}"
          fi

          # Truncate to stay safely under the 256-char limit
          artifact_basename="${artifact_basename:0:200}"

          echo "artifact_basename=${artifact_basename}"
          echo "artifact_basename=${artifact_basename}" >> "$GITHUB_OUTPUT"

      - name: Upload snapshots if needed
        if: ${{ steps.upload-flag.outputs.artifact_uploaded == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          # Make the artifact name unique to allow running this job in parallel
          # Append a ~ at the end to prevent one job's pattern from prefixing another one
          name: ${{ steps.compute_name.outputs.artifact_basename }}~${{ matrix.device }}
          path: ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/snapshots-tmp

    outputs:
      snapshot_artifact_uploaded: ${{ steps.upload-flag.outputs.artifact_uploaded }}
      snapshot_artifact_basename: ${{ steps.compute_name.outputs.artifact_basename }}

  merge_pytest_logs:
    name: Merge pytest logs
    needs: ragger_tests
    runs-on: ubuntu-latest
    if: ${{ inputs.capture_file != '' }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: pytest-logs-*
          path: logs
          merge-multiple: true

      - name: Combine logs
        run: |
          find logs -name "pytest_output.log" -exec cat {} \; > "${CAPTURE_FILE}.log"

      - name: Upload combined logs
        uses: actions/upload-artifact@v6
        with:
          name: "${{ inputs.capture_file }}"
          path: "${{ inputs.capture_file }}.log"

  merge_artifacts_if_needed:
    # Merge matrix output
    name: Merge snapshots artifacts
    needs: ragger_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact/merge@v4
        if: ${{ needs.ragger_tests.outputs.snapshot_artifact_uploaded == 'true' }}
        with:
          # Merge all basename-$device.zip into a single basename.zip
          name: ${{ needs.ragger_tests.outputs.snapshot_artifact_basename }}
          # We pattern against the ~ set above to prevent subpatterning
          pattern: ${{ needs.ragger_tests.outputs.snapshot_artifact_basename }}~*
          delete-merged: true

    outputs:
      # Forward computed base name
      snapshot_artifact_name: ${{ needs.ragger_tests.outputs.snapshot_artifact_basename }}

  pr_new_snapshots:
    name: Open a PR with the new snapshots
    needs: [merge_artifacts_if_needed, call_get_app_metadata, call_get_test_metadata]
    if: ${{ inputs.regenerate_snapshots == true }}
    uses: ./.github/workflows/_open_pr_with_new_snapshots.yml
    with:
      app_repository: ${{ inputs.app_repository }}
      app_branch_name: ${{ inputs.app_branch_name }}
      snapshots_artifact_name: ${{ needs.merge_artifacts_if_needed.outputs.snapshot_artifact_name }}
      snapshots_directory: ${{ needs.call_get_test_metadata.outputs.pytest_directory }}/snapshots

  post_stack_consumption:
    name: Post stack consumption summary on PR
    needs: [ragger_tests, call_get_app_metadata]
    if: ${{ always() && inputs.post_stack_consumption && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download all stack summary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ inputs.stack_consumption_section_id }}-*
          path: summaries
          merge-multiple: true

      - name: Download app binaries for stack reference
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.additional_app_binaries_artifact != '' && inputs.additional_app_binaries_artifact || inputs.download_app_binaries_artifact }}
          path: app_binaries/

      - name: Install dependencies for comment generation
        run: sudo apt-get install -y --no-install-recommends binutils

      - name: Build PR comment body
        id: build_comment
        shell: bash
        run: |
          files=$(find summaries -name "stack_summary_*.txt" | sort)
          if [ -z "$files" ]; then
              echo "No stack summary files found."
              echo "has_report=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          echo "| Device | Worst case (bytes) | Remaining stack (bytes) | Test |" > stack_comment.md
          echo "|--------|------------------:|------------------:|------|" >> stack_comment.md

          has_data=false
          for f in $files; do
              device=$(echo "$f" | sed -n 's/.*stack_summary_\(.*\)\.txt/\1/p')

              if [ -n "${{ inputs.additional_app_binaries_artifact }}" ]; then
                # additional_app_binaries_artifact is set (e.g. app-exchange for swap tests).
                # It is always a C SDK app, so use the C layout.
                DEVICE_NAME="$(echo "${device}" | sed 's/nanosp/nanos2/')"
                APP_PATH=$(find app_binaries/${DEVICE_NAME}/bin -name '*.elf' | head -n 1)
              elif ${{ needs.call_get_app_metadata.outputs.is_rust == 'true' }}; then
                DEVICE_NAME="$(echo "${device}" | sed 's/nanosp/nanosplus/')"
                APP_PATH=$(find app_binaries/${DEVICE_NAME}/release -type f ! -name '*.*' | head -n 1)
              else
                DEVICE_NAME="$(echo "${device}" | sed 's/nanosp/nanos2/')"
                APP_PATH=$(find app_binaries/${DEVICE_NAME}/bin -name '*.elf' | head -n 1)
              fi

              # hardcoded limit of 8kp for nanox
              if [[ "$DEVICE_NAME" == "nanox" ]]; then
                max_stack_size=8192
              else
                estack_addr=$(nm ${APP_PATH} | grep -w '_estack' | awk '{print "0x"$1}')
                stack_addr=$(nm ${APP_PATH} | grep -w '_stack' | awk '{print "0x"$1}')
                max_stack_size=$((estack_addr - stack_addr))
              fi

              [ -z "$device" ] && device="unknown"
              while IFS= read -r line; do
                  if echo "$line" | grep -iqE 'worst case:\s*[0-9]+\s+bytes'; then
                      bytes=$(echo "$line" | sed -n 's/.*worst case:\s*\([0-9]\+\)\s\+bytes.*/\1/Ip')
                      test_name=$(echo "$line" | sed -n 's/.*worst case:\s*[0-9]\+\s\+bytes\s*(\(.*\))/\1/Ip' | sed 's/[[:space:]]*-*$//')
                      echo "| ${device} | ${bytes} | $((max_stack_size - bytes)) | \`${test_name}\` |" >> stack_comment.md
                      has_data=true
                      break
                  fi
              done < "$f"
          done

          if [ "$has_data" = false ]; then
              echo "has_report=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          echo "has_report=true" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: ${{ steps.build_comment.outputs.has_report == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const elfMarker   = '<!-- elf-size-diff -->';
            const stackMarker = '<!-- ${{ inputs.stack_consumption_section_id }} -->';
            const disclaimer =
              '> :warning: This summary is for informative purpose only. ' +
              'It may not give the application actual worst case, for example if the test coverage is low.';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sectionId = '${{ inputs.stack_consumption_section_id }}';
            const sectionTitle = sectionId === 'stack-consumption-summary'
              ? 'Stack consumption summary'
              : 'Stack consumption summary (' + sectionId.replace('stack-consumption-summary-', '') + ')';
            const stackSection =
              stackMarker + '\n ' + sectionTitle + '\n\n' +
              disclaimer + '\n\n' +
              fs.readFileSync('stack_comment.md', 'utf8') +
              `\n[Full details](${runUrl})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Prefer appending to / updating inside the ELF diff comment
            const elfComment = comments.find(c => c.body && c.body.includes(elfMarker));
            if (!elfComment) {
              core.setFailed(
                'No ELF size diff comment found on this PR. ' +
                'The reusable_build workflow with build_comparison enabled must run first to create the comment.'
              );
              return;
            }

            // Replace existing stack section, or append it.
            // The regex matches from this marker up to the next HTML comment marker or end of string,
            // so that other stack sections (e.g. swap vs ragger) are preserved.
            const newBody = elfComment.body.includes(stackMarker)
              ? elfComment.body.replace(
                  new RegExp(stackMarker + '[\\s\\S]*?(?=\\n\\n<!--|$)'),
                  stackSection)
              : elfComment.body.trimEnd() + '\n\n' + stackSection;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: elfComment.id,
              body: newBody,
            });
            console.log(`Appended stack section to ELF comment ${elfComment.id}`);
