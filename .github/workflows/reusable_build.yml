name: Build the application for all devices and upload the artifact

on:
  workflow_call:
    secrets:
      token:
        description: 'A token passed from the caller workflow'
        required: false
    inputs:
      app_repository:
        description: 'The GIT repository to build (defaults to `github.repository`)'
        required: false
        default: ${{ github.repository }}
        type: string
      app_branch_name:
        description: 'The GIT branch to build (defaults to `github.ref`)'
        required: false
        default: ${{ github.ref }}
        type: string
      flags:
        description: "Additional compilation flags for C applications, passed to `make` (default to none)"
        required: false
        default: ''
        type: string
      cargo_additional:
        description: >
          Additional arguments for Rust applications, passed to `cargo ledger build`
          (e.g. `--features variant_x`). Ignored for C applications. Default to none.
        required: false
        default: ''
        type: string
      use_case:
        description: >
          The use case to build the application for.
          Ignored if 'flags' (C apps) or 'cargo_additional' (Rust apps) is set.
        required: false
        default: ''
        type: string
      upload_app_binaries_artifact:
        description: "The name of the artifact containing the built application binary file(s) to be tested"
        required: false
        default: ''
        type: string
      upload_as_lib_artifact:
        description: "If non-empty, prefixes the built application binary file(s) with this string (default to none)"
        required: false
        default: ''
        type: string
      run_for_devices:
        description: |
          The list of device(s) on which the CI will run.

          Defaults to the full list of device(s) supported by the application as configured in the
          'ledger_app.toml' manifest.
          If the manifest is missing, defaults to ALL (["nanos", "nanox", "nanosp", "stax", "flex", "apex_m", "apex_p"]).
        required: false
        default: 'None'
        type: string
      builder:
        description: "The docker image to build the application in (defaults to ledger-app-builder-lite)"
        required: false
        default: 'ledger-app-builder-lite'
        type: string
      sdk_reference:
        description: |
          A C SDK reference to checkout before building the app.
          Default behavior is to build on the current version of the app-builder Docker image.
          As the branch `master` exists locally, `origin/master` should be used to checkout the
          actual, current SDK master branch.
        required: false
        default: ""
        type: string
      build_comparison:
        description: "Whether to perform a build comparison between source and target branches (defaults to true).
                      Requires upload_app_binaries_artifact to be set.
                      If false, not target branch build will be performed, and no artifact will be uploaded for the target branch."
        required: false
        default: false
        type: boolean
      enable_stack_consumption:
        description: "Whether to enable stack consumption tracking in the build (defaults to true).
                      Sets DEBUG_OS_STACK_CONSUMPTION=1 for C apps and --features stack_usage for Rust apps."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write        # Needed for upload-artifact
  pull-requests: write  # Needed to post PR comments

jobs:
  call_get_app_metadata:
    # This job digests inputs and repository metadata provided by the `ledger_app.toml` manifest
    # file, in order to output relevant directories, compatible devices, and other variables needed
    # by following jobs.
    name: Retrieve application metadata
    uses: ./.github/workflows/_get_app_metadata.yml
    with:
      app_repository: ${{ inputs.app_repository }}
      app_branch_name: ${{ inputs.app_branch_name }}
      compatible_devices: ${{ inputs.run_for_devices }}
      flags: ${{ inputs.flags }}
      cargo_additional: ${{ inputs.cargo_additional }}
      use_case: ${{ inputs.use_case }}
    secrets:
      token: ${{ secrets.token }}

  build:
    name: Build application for all selected devices
    needs: call_get_app_metadata
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.call_get_app_metadata.outputs.compatible_devices) }}
    uses: ./.github/workflows/_build_app.yml
    with:
      app_repository: ${{ inputs.app_repository }}
      ref: ${{ inputs.app_branch_name }}
      device: ${{ matrix.device }}
      builder: ${{ inputs.builder }}
      is_rust: ${{ needs.call_get_app_metadata.outputs.is_rust }}
      build_directory: ${{ needs.call_get_app_metadata.outputs.build_directory }}
      flags: ${{ needs.call_get_app_metadata.outputs.flags }}
      cargo_additional: ${{ needs.call_get_app_metadata.outputs.cargo_additional }}
      sdk_reference: ${{ inputs.sdk_reference }}
      enable_stack_consumption: ${{ inputs.enable_stack_consumption }}
      upload_as_lib_artifact: ${{ inputs.upload_as_lib_artifact }}
      artifact_name: ${{ inputs.upload_app_binaries_artifact }}
    secrets:
      token: ${{ secrets.token }}

  merge_artifacts:
    name: Merge build artifacts
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.upload_app_binaries_artifact != '' }}
    steps:
      - uses: actions/upload-artifact/merge@v6
        with:
          name: ${{ inputs.upload_app_binaries_artifact }}
          pattern: ${{ inputs.upload_app_binaries_artifact }}-*
          delete-merged: true

  # The following jobs are used in PRs, to compare builds between source and target branches.
  build_target_branch:
    name: Build target branch sources for all selected devices
    if: ${{ inputs.build_comparison && github.event_name == 'pull_request' && inputs.upload_app_binaries_artifact != '' }}
    needs: call_get_app_metadata
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.call_get_app_metadata.outputs.compatible_devices) }}
    uses: ./.github/workflows/_build_app.yml
    with:
      app_repository: ${{ inputs.app_repository }}
      ref: ${{ github.base_ref }}
      device: ${{ matrix.device }}
      builder: ${{ inputs.builder }}
      is_rust: ${{ needs.call_get_app_metadata.outputs.is_rust }}
      build_directory: ${{ needs.call_get_app_metadata.outputs.build_directory }}
      flags: ${{ needs.call_get_app_metadata.outputs.flags }}
      cargo_additional: ${{ needs.call_get_app_metadata.outputs.cargo_additional }}
      sdk_reference: ${{ inputs.sdk_reference }}
      enable_stack_consumption: ${{ inputs.enable_stack_consumption }}
      upload_as_lib_artifact: ${{ inputs.upload_as_lib_artifact }}
      artifact_name: ${{ inputs.upload_app_binaries_artifact }}_target
    secrets:
      token: ${{ secrets.token }}

  merge_artifacts_target_branch:
    name: Merge build artifacts (target branch)
    needs: build_target_branch
    runs-on: ubuntu-latest
    if: ${{ inputs.build_comparison && github.event_name == 'pull_request' && inputs.upload_app_binaries_artifact != '' }}
    steps:
      - uses: actions/upload-artifact/merge@v6
        with:
          name: ${{ inputs.upload_app_binaries_artifact }}_target
          pattern: ${{ inputs.upload_app_binaries_artifact }}_target-*
          delete-merged: true

  diff_elf_sizes:
    name: Report ELF section sizes and post PR comment
    needs: [call_get_app_metadata, merge_artifacts, merge_artifacts_target_branch]
    runs-on: ubuntu-latest
    if: ${{ inputs.build_comparison && github.event_name == 'pull_request' && inputs.upload_app_binaries_artifact != '' }}

    steps:
      - name: Checkout ledger-app-workflows
        uses: actions/checkout@v6
        with:
          repository: LedgerHQ/ledger-app-workflows
          path: ./ledger-app-workflows
          ref: ${{ fromJSON(toJSON(job)).workflow_sha }}

      - name: Install binutils
        run: ./ledger-app-workflows/scripts/apt_install.sh -n -R binutils

      - name: Download source branch artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.upload_app_binaries_artifact }}
          path: source_artifact/

      - name: Download target branch artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.upload_app_binaries_artifact }}_target
          path: target_artifact/

      - name: Compute ELF section sizes
        shell: bash
        run: |
          SRC="${GITHUB_HEAD_REF}"
          TGT="${GITHUB_BASE_REF}"
          echo "elf sizes" >> elf_diff.md

          echo "source = source branch ${SRC}" >> elf_diff.md
          echo "target = target branch ${TGT}" >> elf_diff.md

          echo "| Device | .text source | .text target | .text delta | .bss source | .bss target | .bss delta | max stack size source | max stack size target | max stack size delta |" >> elf_diff.md
          echo "|--------|---:|---:|---:|---:|---:|---:|---:|---:|---:|" >> elf_diff.md
          for device in $(echo '${{ needs.call_get_app_metadata.outputs.compatible_devices }}' | jq -r '.[]'); do

              if ${{ needs.call_get_app_metadata.outputs.is_rust == 'true' }}; then
                DEVICE_NAME="$(echo "${device}" | sed 's/nanosp/nanosplus/')"
                APP_PATH_SRC=$(find source_artifact/${DEVICE_NAME}/release -type f ! -name '*.*' | head -n 1)
                APP_PATH_TARGET=$(find target_artifact/${DEVICE_NAME}/release -type f ! -name '*.*' | head -n 1)
              else
                DEVICE_NAME="$(echo "${device}" | sed 's/nanosp/nanos2/')"
                APP_PATH_SRC=$(find source_artifact/${DEVICE_NAME}/bin -name '*.elf' | head -n 1)
                APP_PATH_TARGET=$(find target_artifact/${DEVICE_NAME}/bin -name '*.elf' | head -n 1)
              fi

              read src_text <<< $(size ${APP_PATH_SRC} | tail -n 1 | awk '{print $1}')
              read tgt_text <<< $(size ${APP_PATH_TARGET} | tail -n 1 | awk '{print $1}')

              src_bss=$(nm ${APP_PATH_SRC} | grep -w '_bss' | awk '{print "0x"$1}')
              src_ebss=$(nm ${APP_PATH_SRC} | grep -w '_ebss' | awk '{print "0x"$1}')
              src_bss_size=$((src_ebss - src_bss))

              tgt_bss=$(nm ${APP_PATH_TARGET} | grep -w '_bss' | awk '{print "0x"$1}')
              tgt_ebss=$(nm ${APP_PATH_TARGET} | grep -w '_ebss' | awk '{print "0x"$1}')
              tgt_bss_size=$((tgt_ebss - tgt_bss))

              bss_delta=$((src_bss_size - tgt_bss_size))

              if [[ "$DEVICE_NAME" == "nanox" ]]; then
                src_stack_size=8192
                tgt_stack_size=8192
              else
                src_stack=$(nm ${APP_PATH_SRC} | grep -w '_stack' | awk '{print "0x"$1}')
                src_estack=$(nm ${APP_PATH_SRC} | grep -w '_estack' | awk '{print "0x"$1}')
                src_stack_size=$((src_estack - src_stack))
                tgt_stack=$(nm ${APP_PATH_TARGET} | grep -w '_stack' | awk '{print "0x"$1}')
                tgt_estack=$(nm ${APP_PATH_TARGET} | grep -w '_estack' | awk '{print "0x"$1}')
                tgt_stack_size=$((tgt_estack - tgt_stack))
              fi

              stack_delta=$((src_stack_size - tgt_stack_size))

              echo "| ${DEVICE_NAME} | ${src_text} | ${tgt_text} | $((src_text - tgt_text)) | ${src_bss_size} | ${tgt_bss_size} | ${bss_delta} | ${src_stack_size} | ${tgt_stack_size} | ${stack_delta} |" >> elf_diff.md
          done

      - name: Post or update PR comment
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- elf-size-diff -->';
            const body = marker + '\n' + fs.readFileSync('elf_diff.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new comment');
            }
