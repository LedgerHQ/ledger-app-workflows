name: Output metadata on the application, inferred from the local 'ledger_app.toml' manifest or not

on:
  workflow_call:
    secrets:
      token:
        description: 'A token passed from the caller workflow'
        required: false
    inputs:
      app_repository:
        description: 'The GIT repository to build (defaults to `github.repository`)'
        required: false
        default: ${{ github.repository }}
        type: string
      app_branch_name:
        description: 'The GIT branch to build (defaults to `github.ref`)'
        required: false
        default: ${{ github.ref }}
        type: string
      compatible_devices:
        description: |
          The list of device(s) the CI will run on.

          Defaults to the full list of device(s) supported by the application as configured in the
          'ledger_app.toml' manifest.
          If the manifest is missing, defaults to ALL (["nanos", "nanox", "nanosp", "stax", "flex", "apex_m", "apex_p"]).
        required: false
        default: 'None'
        type: string
      flags:
        description: "Additional compilation flags (default to none)"
        required: false
        default: ''
        type: string
      use_case:
        description: >
          The use case to build the application for.
          Ignored if 'flags' (C apps) or 'cargo_additional' (Rust apps) is set.
        required: false
        default: ''
        type: string
      cargo_additional:
        description: >
          Additional arguments passed to `cargo ledger build` for Rust applications
          (e.g. `--features variant_x`). Ignored for C applications.
        required: false
        default: ''
        type: string
    outputs:
      is_rust:
        description: Returns "true" if the app is using Rust SDK, else returns "false"
        value: ${{ jobs.fetch_metadata.outputs.is_rust }}
      build_directory:
        description: |
          Returns the relative 'build_directory' path, i.e the repository directory where can be
          found either the root 'Makefile' of a C app, or the Cargo.toml of a Rust app.
        value: ${{ jobs.fetch_metadata.outputs.build_directory }}
      compatible_devices:
        description:
          The list of device(s) supported by the application.
        value: ${{ jobs.fetch_metadata.outputs.compatible_devices }}
      flags:
        description: |
          The additional compilation flags to use when building a C application (passed to `make`).
        value: ${{ jobs.fetch_metadata.outputs.flags }}
      cargo_additional:
        description: |
          The additional arguments to use when building a Rust application (passed to `cargo ledger build`).
        value: ${{ jobs.fetch_metadata.outputs.cargo_additional }}

env:
  APP_MANIFEST: "ledger_app.toml"
  APP_REPOSITORY: ${{ inputs.app_repository }}
  APP_BRANCH_NAME: ${{ inputs.app_branch_name }}
  COMPATIBLE_DEVICES: ${{ inputs.compatible_devices }}
  FLAGS: ${{ inputs.flags }}
  USE_CASE: ${{ inputs.use_case }}
  CARGO_ADDITIONAL: ${{ inputs.cargo_additional }}

permissions:
  contents: read  # Needed to clone the repositories

jobs:
  fetch_metadata:
    name: Retrieve application metadata
    runs-on: ubuntu-22.04

    steps:
      - name: Clone app repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.app_repository }}
          ref: ${{ inputs.app_branch_name }}
          submodules: recursive
          token: ${{ secrets.token && secrets.token || github.token }}

      - name: Install dependencies
        run: |
          pip install ledgered

      - name: Gather application metadata, from inputs or 'ledger_app.toml'
        id: fetch_metadata
        run: |
          if [ ! -f "$APP_MANIFEST" ];
          then
              >&2 echo "/!\ No $APP_MANIFEST manifest detected!"
              >&2 echo "This file is mandatory, please add it on your repository"
              >&2 echo "Documentation here: https://github.com/LedgerHQ/ledgered/blob/master/doc/utils/manifest.md"
              exit 1
          fi

          # 'ledger_app.toml' exists
          echo "Manifest detected."
          # checking the manifest with the repo
          ledger-manifest --check . "$APP_MANIFEST"

          # build directory
          echo "build_directory=$(ledger-manifest --output-build-directory "$APP_MANIFEST")" >> "${GITHUB_OUTPUT}"

          # get device list as a single line json formatted value
          compatible_devices="$(ledger-manifest --output-devices "$APP_MANIFEST" -j | jq -rc '.devices')"
          if [ "${COMPATIBLE_DEVICES}" != 'None' ];
          then
              # in case classic manifest with devices, the input takes precedence on it
              compatible_devices="${COMPATIBLE_DEVICES}"
          fi
          echo "compatible_devices=${compatible_devices}" | sed 's/+/p/' >> "${GITHUB_OUTPUT}"

          # SDK language
          if [ "$(ledger-manifest --output-sdk "$APP_MANIFEST")" = "rust" ];
          then
              is_rust=true
          else
              is_rust=false
          fi
          echo "is_rust=${is_rust}" >> "${GITHUB_OUTPUT}"

          # Build arguments, resolved per language:
          #  - C apps    use 'flags'            (passed to `make`)
          #  - Rust apps use 'cargo_additional' (passed to `cargo ledger build`)
          # In both cases a 'use_case' (resolved from the manifest) is the fallback when
          # the direct input is not provided. The direct input of the *other* language is
          # ignored, so callers may pass generic C 'flags' to any app (as they do for
          # multi-app pipelines) without breaking Rust builds.
          flags=""
          cargo_additional=""
          if [ "${is_rust}" = "true" ]; then
              if [ -n "${CARGO_ADDITIONAL}" ]; then
                  cargo_additional="${CARGO_ADDITIONAL}"
              elif [ -n "${USE_CASE}" ]; then
                  echo "use_case is set to '${USE_CASE}'"
                  cargo_additional="$(ledger-manifest "$APP_MANIFEST" --output-use-cases "${USE_CASE}")"
              fi
          else
              if [ -n "${FLAGS}" ]; then
                  flags="${FLAGS}"
              elif [ -n "${USE_CASE}" ]; then
                  echo "use_case is set to '${USE_CASE}'"
                  flags="$(ledger-manifest "$APP_MANIFEST" --output-use-cases "${USE_CASE}")"
              fi
          fi
          echo "flags=${flags}" >> "${GITHUB_OUTPUT}"
          echo "cargo_additional=${cargo_additional}" >> "${GITHUB_OUTPUT}"

          echo "Inferred metadata:"
          cat "${GITHUB_OUTPUT}"

    outputs:
      is_rust: ${{ steps.fetch_metadata.outputs.is_rust }}
      compatible_devices: ${{ steps.fetch_metadata.outputs.compatible_devices }}
      build_directory: ${{ steps.fetch_metadata.outputs.build_directory }}
      flags: ${{ steps.fetch_metadata.outputs.flags }}
      cargo_additional: ${{ steps.fetch_metadata.outputs.cargo_additional }}
