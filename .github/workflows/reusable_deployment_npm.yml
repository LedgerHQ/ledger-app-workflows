on:
  workflow_call:
    inputs:
      repository_name:
        description: 'The GIT repository to deploy (defaults to `github.repository`)'
        required: false
        default: ${{ github.repository }}
        type: string
      branch_name:
        description: 'The GIT branch to deploy (defaults to `github.ref`)'
        required: false
        default: ${{ github.ref }}
        type: string
      package_name:
        description: The name of the package.
        required: true
        type: string
      package_directory:
        description: The directory where the npm package lies (where the package.json can be found)
        type: string
        default: .
      dry_run:
        description: If true, runs all pre-publishing steps but skips the actual publishing.
        required: false
        type: boolean
        default: false
      publish:
        description: Whether the package should be published or not
        required: true
        type: boolean
      release:
        description: Whether the package should be packaged as a release or not
        required: false
        type: boolean
        default: true
      jfrog_deployment:
        description: If the npm package should be pushed on Ledger Jfrog or not.
                     Ignored if `publish` is `false`.
        type: boolean
        required: false
        default: true

env:
  REPOSITORY_NAME: ${{ inputs.repository_name }}
  BRANCH_NAME: ${{ inputs.branch_name }}
  PACKAGE_NAME: ${{ inputs.package_name }}
  PACKAGE_DIRECTORY: ${{ inputs.package_directory }}
  DRY_RUN: ${{ inputs.dry_run }}
  PUBLISH: ${{ inputs.publish }}
  RELEASE: ${{ inputs.release }}
  JFROG_DEPLOYMENT: ${{ inputs.jfrog_deployment }}

jobs:
  package_and_deploy:
    name: Build and deploy a npm Package
    runs-on: public-ledgerhq-shared-small
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:

      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ inputs.repository_name }}
          ref: ${{ inputs.branch_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build npm package
        working-directory: ${{ env.PACKAGE_DIRECTORY }}
        run: |
          npm install && npm run build && npm pack
          mkdir -p dist && mv *.tgz dist/

      - name: Attest
        uses: LedgerHQ/actions-security/actions/attest@actions/attest-1
        with:
          subject-path: ${{ env.PACKAGE_DIRECTORY }}/dist

      - name: Login to JFrog Ledger
        id: jfrog-login
        uses: LedgerHQ/actions-security/actions/jfrog-login@actions/jfrog-login-1

      - name: Configure npm authentication
        working-directory: ${{ env.PACKAGE_DIRECTORY }}
        run: |
          echo "registry=https://jfrog.ledgerlabs.net/artifactory/api/npm/embedded-apps-npm-prod-public/" > .npmrc
          echo "//jfrog.ledgerlabs.net/artifactory/api/npm/embedded-apps-npm-prod-public/:_authToken=${{ steps.jfrog-login.outputs.oidc-token }}" >> .npmrc
          echo "//jfrog.ledgerlabs.net/artifactory/api/npm/embedded-apps-npm-prod-public/:always-auth=true" >> .npmrc

      - name: Publish package to JFrog Ledger with npm
        working-directory: ${{ env.PACKAGE_DIRECTORY }}
        run: |
          npm publish || (cat /home/runner/.npm/_logs/*.log && exit 1)
