name: Build, check and deploy an package on pypi.org or test.pypi.org

on:
  workflow_call:
    inputs:
      package_name:
        description: The name of the package.
        required: true
        type: string
      package_directory:
        description: The directory where the Python package lies (where the setup.py or setup.cfg or
                     pyproject.toml can be found)
        type: string
        default: .
      publish:
        description: Whether the package should be published or not
        required: true
        type: boolean
      release:
        description: Whether the package should be packaged as a release or not
        required: false
        type: boolean
        default: true
      jfrog_deployment:
        description: If the Python package should be pushed on Ledger Jfrog or not.
                     Ignored if `publish` is `false`.
        type: boolean
        required: false
        default: true
    secrets:
      pypi_token:
        description: A token enabling to push a package on pypi.org or test.pypi.org
        required: true

env:
  PACKAGE_NAME: ${{ inputs.package_name }}
  PACKAGE_DIRECTORY: ${{ inputs.package_directory }}
  PUBLISH: ${{ inputs.publish }}
  RELEASE: ${{ inputs.release }}
  JFROG_DEPLOYMENT: ${{ inputs.jfrog_deployment }}

jobs:
  handle_inputs:
    name: Handle and validate inputs
    runs-on: ubuntu-latest
    outputs:
      PACKAGE_NAME: ${{ steps.set_outputs.outputs.PACKAGE_NAME }}
      PACKAGE_DIRECTORY: ${{ steps.set_outputs.outputs.PACKAGE_DIRECTORY }}
      PUBLISH: ${{ steps.set_outputs.outputs.PUBLISH }}
      RELEASE: ${{ steps.set_outputs.outputs.RELEASE }}
      JFROG_DEPLOYMENT: ${{ steps.set_outputs.outputs.JFROG_DEPLOYMENT }}
    steps:
      - name: Handle Inputs
        id: set_outputs
        run: |
          {
            echo "PACKAGE_NAME=${PACKAGE_NAME}"
            echo "PACKAGE_DIRECTORY=${PACKAGE_DIRECTORY}"
            echo "PUBLISH=${PUBLISH}"
            echo "RELEASE=${RELEASE}"
            echo "JFROG_DEPLOYMENT=${JFROG_DEPLOYMENT}"
          } >> "$GITHUB_OUTPUT"

  package_and_deploy:
    name: Build and deploy a Python Package
    runs-on: public-ledgerhq-shared-small
    needs: [handle_inputs]
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:

      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Python package
        run: |
          # Needed to workaround this bug https://github.com/pypa/setuptools/issues/4759
          # To be removed when it's fixed
          pip install -U packaging
          pip install --upgrade pip build twine
          cd ${{ needs.handle_inputs.outputs.PACKAGE_DIRECTORY }}
          python -m build
          pip install .
          python -m twine check dist/*
          echo "TAG_VERSION=$(python -c 'from ${{ needs.handle_inputs.outputs.PACKAGE_NAME }} import __version__; print(__version__)')" >> "$GITHUB_ENV"

      - name: Display current status
        run: |
          echo "- Tag version: ${{ needs.handle_inputs.outputs.TAG_VERSION }}"

      - name: Check version against CHANGELOG
        if: ${{ success() && needs.handle_inputs.outputs.PUBLISH == 'true' }}
        run: |
          cd ${{ needs.handle_inputs.outputs.PACKAGE_DIRECTORY }}
          CHANGELOG_VERSION=$(grep -Po '(?<=## \[)(\d+\.)+[^\]]' CHANGELOG.md | head -n 1)
          if [ "${{ needs.handle_inputs.outputs.TAG_VERSION }}" == "${CHANGELOG_VERSION}" ]
          then
              exit 0
          fi
          echo "Tag '${{ needs.handle_inputs.outputs.TAG_VERSION }}' and CHANGELOG '${CHANGELOG_VERSION}' versions mismatch!"
          exit 1

      - name: Publish Python package on pypi.org
        if: ${{ success() && needs.handle_inputs.outputs.PUBLISH == 'true'}}
        run: python -m twine upload ${{ needs.handle_inputs.outputs.PACKAGE_DIRECTORY }}/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.pypi_token  }}
          TWINE_NON_INTERACTIVE: 1

      - name: Login to Ledger Artifactory
        if: ${{ success() && needs.handle_inputs.outputs.PUBLISH == 'true' && needs.handle_inputs.outputs.JFROG_DEPLOYMENT == 'true' }}
        timeout-minutes: 10
        id: jfrog-login
        uses: LedgerHQ/actions-security/actions/jfrog-login@actions/jfrog-login-1

      - name: Publish Python package on Ledger Artifactory
        if: ${{ success() && needs.handle_inputs.outputs.PUBLISH == 'true' && needs.handle_inputs.outputs.JFROG_DEPLOYMENT == 'true' }}
        run: python -m twine upload ${{ needs.handle_inputs.outputs.PACKAGE_DIRECTORY }}/dist/*
        env:
          TWINE_REPOSITORY_URL: https://jfrog.ledgerlabs.net/artifactory/api/pypi/embedded-apps-pypi-prod-green
          TWINE_USERNAME: ${{ steps.jfrog-login.outputs.oidc-user }}
          TWINE_PASSWORD: ${{ steps.jfrog-login.outputs.oidc-token }}
          TWINE_NON_INTERACTIVE: 1

      - name: Generate library build attestations
        if: ${{ success() && needs.handle_inputs.outputs.PUBLISH == 'true' && needs.handle_inputs.outputs.JFROG_DEPLOYMENT == 'true' }}
        timeout-minutes: 10
        uses: LedgerHQ/actions-security/actions/attest@actions/attest-1
        with:
          subject-path: ${{ needs.handle_inputs.outputs.PACKAGE_DIRECTORY }}/dist/*

      - name: Sign library artifacts
        if: ${{ success() && needs.handle_inputs.outputs.PUBLISH == 'true' && needs.handle_inputs.outputs.JFROG_DEPLOYMENT == 'true' }}
        timeout-minutes: 10
        uses: LedgerHQ/actions-security/actions/sign-blob@actions/sign-blob-1
        with:
          path: ${{ needs.handle_inputs.outputs.PACKAGE_DIRECTORY }}/dist

      - name: Publish a release on the repo
        if: ${{ success() && needs.handle_inputs.outputs.PUBLISH == 'true' && needs.handle_inputs.outputs.RELEASE == 'true' }}
        uses: softprops/action-gh-release@aec2ec56f94eb8180ceec724245f64ef008b89f5  # v2.4.0
        with:
          tag_name: "v${{ needs.handle_inputs.outputs.TAG_VERSION }}"
          token: "${{ secrets.GITHUB_TOKEN }}"
          draft: false
          prerelease: false
          files: |
            LICENSE
            CHANGELOG.md
            ${{ needs.handle_inputs.outputs.PACKAGE_DIRECTORY }}/dist/*
