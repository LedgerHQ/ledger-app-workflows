name: Run Clang Static Analyzer (master SDK)

on:
  workflow_call:
    inputs:
      workflows_ref:
        description: 'The current reference in use for the ledger-app-workflow repository'
        required: true
        type: string
      app_repository:
        description: 'The URL of the app repository to check. Defaults to the workflow caller repository URL'
        required: false
        default: ${{ github.repository }}
        type: string
      run_for_devices:
        description: 'The list of device(s) on which the checking will run'
        required: true
        type: string
      relative_app_directory:
        description: 'The relative path in the repository where the application is built from (defaults to ".")'
        required: false
        default: '.'
        type: string
      is_rust:
        description: '"true" if the app is using Rust SDK, else "false"'
        required: true
        type: string

permissions:
  contents: read  # Needed to clone the repositories
  actions: write  # Needed for upload-artifact

env:
  WORKFLOWS_REF: ${{ inputs.workflows_ref }}
  APP_REPOSITORY: ${{ inputs.app_repository }}
  RUN_FOR_DEVICES: ${{ inputs.run_for_devices }}
  RELATIVE_APP_DIRECTORY: ${{ inputs.relative_app_directory }}
  IS_RUST: ${{ inputs.is_rust }}

jobs:
  handle_inputs:
    name: Handle and validate inputs
    runs-on: ubuntu-latest
    outputs:
      WORKFLOWS_REF: ${{ steps.set_outputs.outputs.WORKFLOWS_REF }}
      APP_REPOSITORY: ${{ steps.set_outputs.outputs.APP_REPOSITORY }}
      RUN_FOR_DEVICES: ${{ steps.set_outputs.outputs.RUN_FOR_DEVICES }}
      RELATIVE_APP_DIRECTORY: ${{ steps.set_outputs.outputs.RELATIVE_APP_DIRECTORY }}
      IS_RUST: ${{ steps.set_outputs.outputs.IS_RUST }}
    steps:
      - name: Handle Inputs
        id: set_outputs
        run: |
          {
            echo "WORKFLOWS_REF=${WORKFLOWS_REF}"
            echo "APP_REPOSITORY=${APP_REPOSITORY}"
            echo "RUN_FOR_DEVICES=${RUN_FOR_DEVICES}"
            echo "RELATIVE_APP_DIRECTORY=${RELATIVE_APP_DIRECTORY}"
            echo "IS_RUST=${IS_RUST}"
          } >> "$GITHUB_OUTPUT"

  scan_build:
    name: Clang Static Analyzer on master
    needs: [handle_inputs]
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(inputs.run_for_devices) }}
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:latest

    steps:
      - name: Clone ledger-app-workflows repository
        uses: actions/checkout@v4
        with:
          repository: LedgerHQ/ledger-app-workflows
          path: ./ledger-app-workflows
          ref: ${{ needs.handle_inputs.outputs.WORKFLOWS_REF }}

      - name: Clone app repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.handle_inputs.outputs.APP_REPOSITORY }}
          path: app-repository
          submodules: recursive

      - name: Clone SDK
        uses: actions/checkout@v4
        with:
          repository: LedgerHQ/ledger-secure-sdk
          path: sdk
          ref: master

      - name: Build with Clang Static Analyzer
        if: ${{ needs.handle_inputs.outputs.IS_RUST == 'false'}}
        run: |
            BOLOS_SDK=${GITHUB_WORKSPACE}/sdk && \
            ./ledger-app-workflows/scripts/check_all.sh -c scan -t ${{ matrix.device }} \
              -a ./app-repository -b ${{ needs.handle_inputs.outputs.RELATIVE_APP_DIRECTORY }}

      - name: Upload scan result
        if: failure() && ${{ needs.handle_inputs.outputs.IS_RUST == 'false'}}
        uses: actions/upload-artifact@v4
        with:
          name: scan-build
          path: scan-build
